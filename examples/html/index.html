<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>XRPL Wallet Kit HTML Example</title></head>
  <body>
    <button id="connect">Connect Wallet</button>
    <pre id="log"></pre>
    <script type="module">
      import { WalletManager, createBrowserWalletStorage } from "../../packages/core/src/index.ts";
      import { createGemWalletAdapter } from "../../packages/adapters/gemwallet/src/index.ts";
      import { createCrossmarkAdapter } from "../../packages/adapters/crossmark/src/index.ts";
      import { createWalletModal } from "../../packages/ui/src/index.ts";
      const log = (value) => (document.querySelector("#log").textContent += `${value}\n`);
      const manager = new WalletManager({ appName: "XRPL Wallet Kit HTML Example", network: "mainnet", autoReconnect: true, storage: createBrowserWalletStorage(), adapters: [createGemWalletAdapter(), createCrossmarkAdapter()] });
      manager.on("connected", ({ account }) => log(`connected: ${account.address}`));
      manager.on("error", ({ error }) => log(error?.message ?? String(error)));
      const modal = createWalletModal({ manager, theme: { accent: "#0078ae" } });
      document.querySelector("#connect").addEventListener("click", () => modal.open());
    </script>
  </body>
</html>
