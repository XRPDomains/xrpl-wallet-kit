<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XRPL Wallet Kit HTML/jQuery Preview</title>
    <style>
      :root {
        color: #111827;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7fb;
      }

      body {
        margin: 0;
      }

      .page {
        box-sizing: border-box;
        margin: 0 auto;
        max-width: 960px;
        min-height: 100vh;
        padding: 48px 20px;
      }

      .hero {
        align-items: center;
        display: flex;
        gap: 20px;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      h1 {
        font-size: 32px;
        line-height: 1.15;
        margin: 0 0 8px;
      }

      p {
        color: #52627a;
        margin: 0;
      }

      .panel {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        margin-top: 18px;
        padding: 22px;
      }

      .panel h2 {
        font-size: 18px;
        margin: 0 0 14px;
      }

      pre {
        background: #111827;
        border-radius: 12px;
        color: #c7d2fe;
        font-size: 13px;
        line-height: 1.55;
        margin: 0;
        min-height: 96px;
        overflow: auto;
        padding: 16px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        background: #f8fafc;
        border: 1px solid #dce3ec;
        border-radius: 12px;
        color: #111827;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        min-height: 42px;
        padding: 10px 14px;
      }

      button:hover {
        background: #eef3f8;
      }

      @media (max-width: 720px) {
        .page {
          padding: 28px 14px;
        }

        .hero {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div>
          <h1>XRPL Wallet Kit</h1>
          <p>HTML/jQuery style integration using one browser bundle.</p>
        </div>
        <div id="connect-wallet"></div>
      </section>

      <section class="panel">
        <h2>Manual controls</h2>
        <div class="actions">
          <button id="open-wallet-modal" type="button">Open wallet modal</button>
          <button id="disconnect-wallet" type="button">Disconnect</button>
        </div>
      </section>

      <section class="panel">
        <h2>Session</h2>
        <pre id="session-output">No wallet connected.</pre>
      </section>

      <section class="panel">
        <h2>Events</h2>
        <pre id="events-output"></pre>
      </section>
    </main>

    <script>
      window.XRPL_WALLET_KIT_DEMO_CONFIG = {
        xamanClientId: "",
        walletConnectProjectId: ""
      };
    </script>
    <script src="/xrpl-wallet-kit.iife.min.js?v=0.1.0-beta.1"></script>
    <script>
      (function () {
        var demoConfig = window.XRPL_WALLET_KIT_DEMO_CONFIG || {};
        var xamanClientId = demoConfig.xamanClientId || "";
        var walletConnectProjectId = demoConfig.walletConnectProjectId || "";

        var kit = XRPLWalletKit.create({
          appName: "XRPL Wallet Kit HTML Preview",
          appDescription: "HTML/jquery style integration preview",
          appUrl: window.location.origin,
          network: "mainnet",
          storage: "localStorage",
          autoReconnect: true,
          xamanClientId: xamanClientId,
          walletConnectProjectId: walletConnectProjectId,
          wallets: "all",
          ui: {
            mode: "light",
            customTheme: {
              accent: "#0078ae",
              radius: "14px",
              walletRadius: "14px",
              shadow: "none"
            },
            modal: {
              title: "Connect Wallet",
              width: "default",
              footerText: "XRPL Wallet Kit"
            },
            walletList: {
              layout: "list",
              wallets: "all",
              showGroup: true,
              showInstalledBadge: true
            },
            walletConnect: {
              mode: "group",
              cta: "both",
              qr: {
                style: "dots",
                showLogo: false
              }
            },
            accountPanel: {
              mode: "modal",
              copyAddress: true,
              disconnect: true,
              explorer: false
            },
            identity: {
              enabled: true,
              fallbackToAddress: true
            }
          },
          connectButton: {
            target: "#connect-wallet",
            label: "Connect Wallet",
            size: "md",
            variant: "default",
            showBalance: true
          }
        });

        var sessionOutput = document.getElementById("session-output");
        var eventsOutput = document.getElementById("events-output");

        if (!xamanClientId) {
          log("config_warning", { message: "xamanClientId is empty; Xaman adapter is disabled." });
        }

        if (!walletConnectProjectId) {
          log("config_warning", { message: "walletConnectProjectId is empty; WalletConnect adapters are disabled." });
        }

        function renderSession() {
          var session = kit.manager.getSession();
          sessionOutput.textContent = session ? JSON.stringify(session, null, 2) : "No wallet connected.";
        }

        function log(name, payload) {
          eventsOutput.textContent = new Date().toLocaleTimeString() + " " + name + " " + JSON.stringify(payload) + "\n" + eventsOutput.textContent;
        }

        document.getElementById("open-wallet-modal").addEventListener("click", function () {
          kit.openModal();
        });

        document.getElementById("disconnect-wallet").addEventListener("click", function () {
          kit.manager.disconnect();
        });

        kit.manager.on("connecting", function (event) { log("connecting", event); });
        kit.manager.on("connected", function (event) {
          log("connected", event);
          renderSession();
        });
        kit.manager.on("disconnected", function (event) {
          log("disconnected", event);
          renderSession();
        });
        kit.manager.on("qr", function (event) {
          log("qr", { adapterId: event.adapterId, uriLength: event.uri.length, deeplink: event.deeplink });
        });
        kit.manager.on("error", function (event) {
          log("error", { message: event.error && event.error.message ? event.error.message : String(event.error) });
        });

        renderSession();
      })();
    </script>
  </body>
</html>
